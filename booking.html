<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Session — Train With Buse</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --blush: #E8B4B8;
      --blush-light: #F5D5D8;
      --cream: #FDF6F0;
      --cream-deep: #F5EBE0;
      --rose: #C1848B;
      --rose-dark: #9B6B6F;
      --charcoal: #2D2A2E;
      --charcoal-light: #4A4548;
      --gold: #C8A96E;
      --nude: #D4A89A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--cream-deep); color: var(--charcoal); min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(253,246,240,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(232,180,184,.15);
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .topbar-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--charcoal-light); text-decoration: none; transition: color .2s; }
    .topbar-back:hover { color: var(--rose); }
    .topbar-back svg { width: 16px; height: 16px; }
    .topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--charcoal); }
    .topbar-logo { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; letter-spacing: 3px; color: var(--charcoal); text-decoration: none; }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; max-width: 1100px; margin: 80px auto 0; padding: 24px; min-height: calc(100vh - 80px); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    /* CARD */
    .card { background: #fff; border-radius: 20px; padding: 28px; border: 1px solid rgba(232,180,184,.12); }

    /* CALENDAR */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .cal-month { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--charcoal); }
    .cal-nav { display: flex; gap: 8px; }
    .cal-nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid rgba(232,180,184,.3); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--charcoal-light); transition: all .2s; }
    .cal-nav-btn:hover { border-color: var(--rose); color: var(--rose); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-label { text-align: center; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--charcoal-light); padding: 8px 0; font-weight: 500; }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 14px; border-radius: 50%; cursor: pointer;
      transition: all .2s; color: var(--charcoal); position: relative;
    }
    .cal-day:hover:not(.cal-day-empty):not(.cal-day-past) { background: var(--cream); }
    .cal-day-empty { cursor: default; color: rgba(45,42,46,.2); }
    .cal-day-past { cursor: default; color: rgba(45,42,46,.25); }
    .cal-day-today { font-weight: 600; color: var(--rose); }
    .cal-day-selected { background: var(--charcoal) !important; color: #fff !important; font-weight: 500; }
    .cal-day-has-booking::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--rose); }
    .cal-day-selected.cal-day-has-booking::after { background: var(--blush); }

    /* BOOKING FORM */
    .form-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(232,180,184,.15); }
    .form-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--charcoal-light); font-weight: 500; margin-bottom: 10px; display: block; }
    .selected-date-display { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--charcoal); margin-bottom: 16px; }

    .type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .type-btn { padding: 12px; border-radius: 12px; border: 1.5px solid rgba(232,180,184,.25); background: #fff; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--charcoal); transition: all .2s; text-align: center; }
    .type-btn:hover { border-color: var(--rose); }
    .type-btn.active { border-color: var(--rose); background: rgba(193,132,139,.06); color: var(--rose-dark); font-weight: 500; }

    .time-slots { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .time-slot { padding: 8px 14px; border-radius: 50px; border: 1.5px solid rgba(232,180,184,.25); background: #fff; cursor: pointer; font-size: 13px; color: var(--charcoal); transition: all .2s; }
    .time-slot:hover { border-color: var(--rose); }
    .time-slot.active { border-color: var(--rose); background: var(--rose); color: #fff; }

    textarea { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid rgba(232,180,184,.25); background: #fff; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--charcoal); outline: none; resize: vertical; min-height: 80px; transition: border .2s; margin-bottom: 16px; }
    textarea:focus { border-color: var(--rose); }

    .submit-btn { width: 100%; padding: 15px; border-radius: 50px; background: var(--charcoal); color: var(--cream); font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; border: none; cursor: pointer; transition: all .3s; }
    .submit-btn:hover { background: var(--rose-dark); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* RIGHT PANEL */
    .right-panel { display: flex; flex-direction: column; gap: 16px; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(232,180,184,.15); border-radius: 16px; overflow: hidden; }
    .stat-box { background: #fff; padding: 16px 12px; text-align: center; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--charcoal); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--charcoal-light); }

    /* BOOKINGS LIST */
    .bookings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .bookings-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; }
    .filter-tabs { display: flex; gap: 4px; }
    .filter-tab { padding: 5px 12px; border-radius: 50px; font-size: 11px; letter-spacing: .5px; cursor: pointer; border: 1.5px solid transparent; transition: all .2s; color: var(--charcoal-light); }
    .filter-tab:hover { color: var(--charcoal); }
    .filter-tab.active { border-color: var(--rose); color: var(--rose-dark); background: rgba(193,132,139,.06); }

    .booking-item { padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(232,180,184,.15); margin-bottom: 10px; transition: all .2s; cursor: default; }
    .booking-item:hover { border-color: rgba(232,180,184,.4); box-shadow: 0 4px 12px rgba(193,132,139,.08); }
    .booking-item-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
    .booking-date { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; color: var(--charcoal); }
    .booking-time { font-size: 12px; color: var(--charcoal-light); margin-top: 2px; }
    .booking-type { font-size: 11px; color: var(--charcoal-light); margin-top: 4px; }
    .status-badge { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .status-pending { background: rgba(200,169,110,.12); color: #8B6B2E; }
    .status-confirmed { background: rgba(100,180,120,.12); color: #2D6B3F; }
    .status-cancelled { background: rgba(200,80,80,.1); color: #8B2D2D; }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--charcoal-light); }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* SUCCESS TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--charcoal); color: var(--cream); padding: 14px 24px; border-radius: 50px; font-size: 13px; transition: transform .4s cubic-bezier(.16,1,.3,1); z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* AUTH GUARD */
    .auth-guard { display: none; text-align: center; padding: 100px 24px; }
    .auth-guard h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 12px; }
    .auth-guard p { font-size: 14px; color: var(--charcoal-light); margin-bottom: 24px; }
    .auth-btn { display: inline-block; padding: 14px 32px; border-radius: 50px; background: var(--charcoal); color: var(--cream); font-family: 'Outfit', sans-serif; font-size: 13px; text-decoration: none; }

    /* ERROR */
    .error-note { font-size: 12px; color: #c0392b; margin-top: 8px; display: none; }

    .no-purchase-note { background: var(--cream); border-radius: 12px; padding: 14px 16px; font-size: 13px; color: var(--charcoal-light); line-height: 1.6; margin-bottom: 16px; }
    .no-purchase-note a { color: var(--rose); text-decoration: none; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="dashboard.html" class="topbar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </a>
    <div class="topbar-title">Book a Session</div>
  </div>
  <a href="index.html" class="topbar-logo">BUSE</a>
</div>

<div id="authGuard" class="auth-guard">
  <h2>Login Required</h2>
  <p>Please log in to book a session with Buse.</p>
  <a href="login.html" class="auth-btn">Log In →</a>
</div>

<div class="layout" id="mainLayout" style="display:none;">

  <!-- LEFT: Calendar + Form -->
  <div>
    <div class="card">
      <!-- Calendar -->
      <div class="cal-header">
        <div class="cal-month" id="calMonth"></div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="cal-nav-btn" onclick="changeMonth(1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>

      <!-- Booking Form -->
      <div class="form-section" id="bookingFormSection" style="display:none;">
        <div class="selected-date-display" id="selectedDateDisplay"></div>

        <div id="noPurchaseMsg" class="no-purchase-note" style="display:none;">
          You don't have an active coaching session. <a href="https://buy.stripe.com/8x2dR835f1Fi1FO5YC1kA0j" target="_blank">Book a Single Session →</a>
        </div>

        <div id="bookingFormInner">
          <label class="form-label">Session Type</label>
          <div class="type-row" id="typeRow"></div>

          <label class="form-label">Preferred Time</label>
          <div class="time-slots" id="timeSlots">
            <div class="time-slot" onclick="selectTime(this,'08:00')">08:00</div>
            <div class="time-slot" onclick="selectTime(this,'09:00')">09:00</div>
            <div class="time-slot" onclick="selectTime(this,'10:00')">10:00</div>
            <div class="time-slot" onclick="selectTime(this,'11:00')">11:00</div>
            <div class="time-slot" onclick="selectTime(this,'12:00')">12:00</div>
            <div class="time-slot" onclick="selectTime(this,'13:00')">13:00</div>
            <div class="time-slot" onclick="selectTime(this,'14:00')">14:00</div>
            <div class="time-slot" onclick="selectTime(this,'15:00')">15:00</div>
            <div class="time-slot" onclick="selectTime(this,'16:00')">16:00</div>
            <div class="time-slot" onclick="selectTime(this,'17:00')">17:00</div>
            <div class="time-slot" onclick="selectTime(this,'18:00')">18:00</div>
            <div class="time-slot" onclick="selectTime(this,'19:00')">19:00</div>
            <div class="time-slot" onclick="selectTime(this,'20:00')">20:00</div>
          </div>

          <label class="form-label">Notes (optional)</label>
          <textarea id="bookingNotes" placeholder="Any goals, injuries or preferences Buse should know..."></textarea>

          <button class="submit-btn" id="submitBtn" onclick="submitBooking()">Send Request →</button>
          <div class="error-note" id="errorNote"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Stats + Bookings -->
  <div class="right-panel">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-box">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statPending">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statConfirmed">—</div>
        <div class="stat-label">Confirmed</div>
      </div>
    </div>

    <!-- Bookings list -->
    <div class="card">
      <div class="bookings-header">
        <div class="bookings-title">My Bookings</div>
        <div class="filter-tabs">
          <div class="filter-tab active" onclick="filterBookings('all', this)">All</div>
          <div class="filter-tab" onclick="filterBookings('pending', this)">Pending</div>
          <div class="filter-tab" onclick="filterBookings('confirmed', this)">Done</div>
        </div>
      </div>
      <div id="bookingsList"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let allBookings = [];
let selectedDate = null;
let selectedType = null;
let selectedTime = null;
let viewYear, viewMonth;
let userPurchases = new Set();
let bookingDates = new Set();
let currentFilter = 'all';

const COACHING_IDS = ['online-single', 'online-8pack', 'inperson-single', 'inperson-10pack'];
const PKG_INFO = {
  'online-single':   { label: 'Online (Zoom)', type: 'online' },
  'online-8pack':    { label: 'Online (Zoom)', type: 'online' },
  'inperson-single': { label: 'In-Person (Berlin)', type: 'inperson' },
  'inperson-10pack': { label: 'In-Person (Berlin)', type: 'inperson' },
};

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// Init
sb.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) {
    document.getElementById('authGuard').style.display = 'block';
    return;
  }
  currentUser = session.user;
  document.getElementById('mainLayout').style.display = 'grid';

  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  await loadData();
  renderCalendar();
  renderBookingsList();
});

async function loadData() {
  const [{ data: purchases }, { data: bookings }] = await Promise.all([
    sb.from('purchases').select('course_id').eq('user_id', currentUser.id),
    sb.from('bookings').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false })
  ]);

  userPurchases = new Set((purchases || []).map(p => p.course_id));
  allBookings = bookings || [];
  bookingDates = new Set(allBookings.map(b => b.requested_date));

  // Stats
  document.getElementById('statTotal').textContent = allBookings.length;
  document.getElementById('statPending').textContent = allBookings.filter(b => b.status === 'pending').length;
  document.getElementById('statConfirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
}

function renderCalendar() {
  document.getElementById('calMonth').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = DAYS.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < offset; i++) {
    grid.innerHTML += `<div class="cal-day cal-day-empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const isToday = date.toDateString() === today.toDateString();
    const isSelected = selectedDate === dateStr;
    const hasBooking = bookingDates.has(dateStr);

    let cls = 'cal-day';
    if (isPast) cls += ' cal-day-past';
    if (isToday) cls += ' cal-day-today';
    if (isSelected) cls += ' cal-day-selected';
    if (hasBooking) cls += ' cal-day-has-booking';

    const onclick = isPast ? '' : `onclick="selectDate('${dateStr}')"`;
    grid.innerHTML += `<div class="${cls}" ${onclick}>${d}</div>`;
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  selectedType = null;
  selectedTime = null;
  renderCalendar();

  const section = document.getElementById('bookingFormSection');
  section.style.display = 'block';

  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('selectedDateDisplay').textContent =
    d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // Check purchases
  const hasOnline = [...userPurchases].some(id => ['online-single','online-8pack'].includes(id));
  const hasInperson = [...userPurchases].some(id => ['inperson-single','inperson-10pack'].includes(id));
  const hasCoaching = hasOnline || hasInperson;

  const noPurchaseMsg = document.getElementById('noPurchaseMsg');
  const formInner = document.getElementById('bookingFormInner');

  if (!hasCoaching) {
    noPurchaseMsg.style.display = 'block';
    formInner.style.display = 'none';
    return;
  }

  noPurchaseMsg.style.display = 'none';
  formInner.style.display = 'block';

  // Build type buttons
  const typeRow = document.getElementById('typeRow');
  typeRow.innerHTML = '';
  if (hasOnline) {
    typeRow.innerHTML += `<button class="type-btn" onclick="selectType(this,'online')">Online (Zoom)</button>`;
  }
  if (hasInperson) {
    typeRow.innerHTML += `<button class="type-btn" onclick="selectType(this,'inperson')">In-Person (Berlin)</button>`;
  }

  // Reset time slots
  document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('active'));
  document.getElementById('bookingNotes').value = '';
  document.getElementById('errorNote').style.display = 'none';

  section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectType(btn, type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function selectTime(el, time) {
  selectedTime = time;
  document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

async function submitBooking() {
  const errorNote = document.getElementById('errorNote');
  errorNote.style.display = 'none';

  if (!selectedType) { showError('Please select a session type.'); return; }
  if (!selectedTime) { showError('Please select a time.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const { error } = await sb.from('bookings').insert({
    user_id: currentUser.id,
    user_email: currentUser.email,
    session_type: selectedType,
    requested_date: selectedDate,
    requested_time: selectedTime,
    notes: document.getElementById('bookingNotes').value || null,
    status: 'pending'
  });

  btn.disabled = false;
  btn.textContent = 'Send Request →';

  if (error) { showError('Something went wrong. Please try again.'); return; }

  showToast('Request sent! Buse will confirm within 12 hours.');
  document.getElementById('bookingFormSection').style.display = 'none';
  selectedDate = null; selectedType = null; selectedTime = null;

  await loadData();
  renderCalendar();
  renderBookingsList();
}

function showError(msg) {
  const el = document.getElementById('errorNote');
  el.textContent = msg;
  el.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function filterBookings(filter, tab) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderBookingsList();
}

function renderBookingsList() {
  const list = document.getElementById('bookingsList');
  let items = allBookings;
  if (currentFilter === 'pending') items = items.filter(b => b.status === 'pending');
  if (currentFilter === 'confirmed') items = items.filter(b => b.status === 'confirmed');

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state"><p>${currentFilter === 'all' ? 'No booking requests yet.<br>Select a date on the calendar to get started.' : 'No ' + currentFilter + ' bookings.'}</p></div>`;
    return;
  }

  list.innerHTML = items.map(b => {
    const d = new Date(b.requested_date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const statusClass = `status-${b.status}`;
    const statusLabel = b.status === 'pending' ? 'Pending' : b.status === 'confirmed' ? 'Confirmed' : 'Cancelled';
    const typeLabel = b.session_type === 'online' ? 'Online (Zoom)' : 'In-Person (Berlin)';

    return `<div class="booking-item">
      <div class="booking-item-top">
        <div>
          <div class="booking-date">${dateStr}</div>
          <div class="booking-time">${b.requested_time}</div>
        </div>
        <div class="status-badge ${statusClass}">${statusLabel}</div>
      </div>
      <div class="booking-type">${typeLabel}</div>
      ${b.notes ? `<div style="font-size:12px;color:var(--charcoal-light);margin-top:6px;padding-top:6px;border-top:1px solid rgba(232,180,184,.1);">${b.notes.substring(0,80)}${b.notes.length > 80 ? '...' : ''}</div>` : ''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
